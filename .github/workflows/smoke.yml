name: Smoke Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎日 09:00 JST (00:00 UTC) に実行 — 本番URLのヘルスチェック
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  smoke:
    name: Run Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  validate-syntax:
    name: Validate JS syntax
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JS files
        run: |
          node --check app.js
          node --check courses.js
          node --check photos.js
          node --check sw.js
          echo "All JS files parse successfully"
