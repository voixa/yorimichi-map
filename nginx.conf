server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_types text/css application/javascript text/html application/json image/svg+xml;
  gzip_min_length 256;

  # Service Worker: never cache (so updates propagate immediately)
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # HTML: never cache during active development
  location ~* \.html$ {
    add_header Cache-Control "no-cache, must-revalidate";
    expires 0;
  }

  # JS/CSS/JSON: short cache + revalidate
  location ~* \.(js|css|json)$ {
    add_header Cache-Control "public, max-age=300, must-revalidate";
  }

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

  # Default: serve files; fall back to index.html for SPA-style URLs
  location / {
    try_files $uri $uri/ /index.html;
  }
}
