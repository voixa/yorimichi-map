<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7e3d"/>
      <stop offset="50%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <radialGradient id="globe" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball1" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </radialGradient>
    <radialGradient id="ball2" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </radialGradient>
    <radialGradient id="ball3" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#f06292"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </radialGradient>
    <radialGradient id="ball4" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </radialGradient>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100" r="180" fill="white" fill-opacity="0.08"/>
  <circle cx="1100" cy="550" r="240" fill="white" fill-opacity="0.06"/>

  <!-- Gachapon machine on right -->
  <g transform="translate(820, 130)">
    <!-- Globe -->
    <circle cx="120" cy="120" r="120" fill="rgba(255,200,180,0.4)" stroke="#b71c1c" stroke-width="8"/>
    <circle cx="120" cy="120" r="116" fill="url(#globe)"/>
    <!-- Balls inside -->
    <circle cx="80" cy="80" r="22" fill="url(#ball1)"/>
    <circle cx="160" cy="100" r="22" fill="url(#ball2)"/>
    <circle cx="100" cy="150" r="22" fill="url(#ball3)"/>
    <circle cx="170" cy="170" r="22" fill="url(#ball4)"/>
    <!-- Body -->
    <rect x="40" y="240" width="160" height="80" rx="8" fill="#c62828"/>
    <rect x="50" y="258" width="60" height="22" rx="4" fill="#1a1a1a"/>
    <text x="80" y="276" text-anchor="middle" font-size="14" font-weight="800" fill="#ffd54f" font-family="sans-serif">¥100</text>
    <!-- Handle -->
    <circle cx="160" cy="280" r="22" fill="#ffd54f" stroke="#fff" stroke-width="3"/>
    <rect x="148" y="277" width="24" height="6" rx="3" fill="#5a3a00"/>
    <!-- Tray -->
    <rect x="20" y="320" width="200" height="50" rx="8" fill="#b71c1c"/>
    <rect x="80" y="340" width="80" height="20" rx="4" fill="#1a0000"/>
  </g>

  <!-- Brand + Tagline -->
  <g transform="translate(80, 200)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="64" font-weight="900" fill="white">
      <tspan x="0" dy="0">👣 寄り道マップ</tspan>
    </text>
    <text x="0" y="100" font-family="-apple-system, sans-serif" font-size="44" font-weight="700" fill="white">
      <tspan x="0" dy="0">あと◯分あったら、</tspan>
      <tspan x="0" dy="60">どこ寄る？</tspan>
    </text>
    <text x="0" y="280" font-family="-apple-system, sans-serif" font-size="22" font-weight="500" fill="white" fill-opacity="0.9">
      <tspan x="0" dy="0">街の散歩コースをガチャで引いて、</tspan>
      <tspan x="0" dy="32">スタンプラリーで遊べる地図サービス</tspan>
    </text>
  </g>

  <!-- Hashtags / footer -->
  <g transform="translate(80, 560)">
    <text font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="white" fill-opacity="0.9">
      🎰 ガチャ × 🚶 散歩 × 🏅 スタンプラリー
    </text>
  </g>
</svg>
