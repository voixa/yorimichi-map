<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オフライン — 寄り道マップ</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👣</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", Arial, sans-serif;
      background: linear-gradient(135deg, #fafaf7 0%, #fff8e1 100%);
      color: #1c1c1f;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .offline-card {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .offline-icon { font-size: 72px; margin-bottom: 16px; line-height: 1; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #6b6b72; line-height: 1.6; margin-bottom: 16px; font-size: 14px; }
    .tips {
      background: #fff8e1;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 16px 0;
      text-align: left;
      font-size: 13px;
      color: #5a3a00;
    }
    .tips ul { margin-left: 20px; }
    button {
      background: linear-gradient(135deg, #ff7e3d, #ff4081);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 64, 129, 0.3);
    }
    button:hover { transform: translateY(-2px); }
    .small { font-size: 11px; color: #94a3b8; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">📡</div>
    <h1>オフラインです</h1>
    <p>インターネット接続が切れているため、地図やコース情報を読み込めません。</p>

    <div class="tips">
      <strong>📲 オフラインでも遊べること</strong>
      <ul>
        <li>過去にアクセスしたコース図鑑の閲覧</li>
        <li>引いたコースのスポット一覧</li>
        <li>プロフィール・経験値・バッジ</li>
        <li>進行中のウォークスタンプチェックイン（手動）</li>
      </ul>
    </div>

    <button onclick="location.reload()">🔄 再接続を試す</button>

    <p class="small">👣 寄り道マップ ・ Service Worker が動いています</p>
  </div>
</body>
</html>
